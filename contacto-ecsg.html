
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contacto | ECSG Tech</title>
  <meta name="description" content="Formulario de contacto para Enterprise Cloud Solutions Group (ECSG). Envíanos tu consulta y te responderemos en menos de 24 horas.">
  <!-- Sugerencias para Azure Static Web Apps / proxies que quitan el Referer -->
  <meta name="referrer" content="origin"> 
  <!-- Si tu hosting añade CSP estricta, habilitamos 'form-action' para FormSubmit (puede ser sobreescrita por cabeceras del servidor) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' data:; form-action 'self' https://formsubmit.co; connect-src 'self';">
  <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;margin:0;background:#0b1220;color:#e6eefc} .wrap{max-width:960px;margin:auto;padding:32px} label{display:block;margin:8px 0 4px} input,select,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.04);color:#e6eefc} .row{display:grid;grid-template-columns:1fr 1fr;gap:16px} @media(max-width:700px){.row{grid-template-columns:1fr}} .btn{background:#0d6efd;color:#fff;border:0;padding:12px 16px;border-radius:10px;cursor:pointer;margin-top:8px}
  .note{opacity:.8;font-size:.9rem}
  .success{display:none;background:#163820;border:1px solid #2da24f;padding:12px;border-radius:10px;margin:10px 0}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Contacto y Solicitud de Presupuesto</h1>
    <p class="note">Abre y prueba este formulario en tu dominio público (HTTPS). Si ves este archivo en local, FormSubmit no funcionará.</p>

    <div id="successBox" class="success" role="alert">¡Gracias! Tu mensaje fue enviado. Te responderemos pronto.</div>

    <form id="contactForm" action="https://formsubmit.co/info@ecsgtech.com" method="POST" novalidate>
      <input type="hidden" name="_subject" value="Nuevo mensaje desde ecsgtech.com">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="true">
      <input type="hidden" name="_autoresponse" value="¡Hola! Hemos recibido tu mensaje. Te responderemos en menos de 24 horas.">
      <input type="hidden" name="_next" value="{CURRENT_URL}#ok">
      <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">

      <div class="row">
        <div>
          <label for="nombre">Nombre y apellido *</label>
          <input id="nombre" name="Nombre" required minlength="3" placeholder="Ej. María Pérez">
        </div>
        <div>
          <label for="email">Correo electrónico *</label>
          <input id="email" name="Email" type="email" required placeholder="tucorreo@dominio.com">
        </div>
      </div>

      <div class="row">
        <div>
          <label for="telefono">Teléfono</label>
          <input id="telefono" name="Telefono" type="tel" placeholder="Ej. +1 203 555 1212">
        </div>
        <div>
          <label for="tipo">Tipo de proyecto *</label>
          <select id="tipo" name="Tipo de proyecto" required>
            <option value="" disabled selected>Selecciona una opción</option>
            <option>Landing Page</option>
            <option>Sitio Corporativo</option>
            <option>Ecommerce</option>
            <option>Rediseño</option>
            <option>Soporte / Mantenimiento</option>
            <option>Otro</option>
          </select>
        </div>
      </div>

      <label for="mensaje">Cuéntanos sobre tu proyecto *</label>
      <textarea id="mensaje" name="Mensaje" rows="6" required minlength="20" placeholder="Objetivo, funcionalidades, referencias de diseño, etc."></textarea>

      <label><input type="checkbox" id="acepto" required> Acepto la política de privacidad *</label>

      <button class="btn" type="submit">Enviar</button>
      <p class="note">Tiempo de respuesta: 4–8 h laborables.</p>
    </form>
  </div>

  <script>
    // Autoconfigura _next a la URL actual con #ok
    (function(){
      var next = document.querySelector('input[name="_next"]');
      if(next){ next.value = window.location.origin + window.location.pathname + '#ok'; }
      if(window.location.hash === '#ok'){
        var box = document.getElementById('successBox');
        if(box) box.style.display = 'block';
      }
    })();
  </script>
</body>
</html>
